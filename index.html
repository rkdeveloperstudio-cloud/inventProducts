<!DOCTYPE html>
<html>
<head>
    <title>Inventory PWA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: Arial;
            padding: 12px;
            background: #f5f5f5;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .box {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        #results div {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
        }

        /* ===== Scanner UI ===== */

        #scannerContainer {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 250px;
            height: 200px;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
        }

        #scannerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* scanning line */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: red;
            top: 50%;
            animation: move 1.5s infinite;
        }

        @keyframes move {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }

        #closeBtn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border: none;
            padding: 5px;
            border-radius: 4px;
            font-size: 12px;
        }

    </style>
</head>

<body>

<h3>Product Search</h3>

<!-- Barcode Search -->
<div class="box">
    <h4>Barcode Search</h4>
    <input id="barcodeBox" placeholder="Enter barcode">
    <button onclick="searchByBarcode()">Search Barcode</button>
    <button onclick="openScanner()">Scan Barcode (Camera)</button>
</div>

<!-- Keyword Search -->
<div class="box">
    <h4>Keyword Search</h4>
    <input id="keywordBox" placeholder="Enter product name">
    <button onclick="searchByKeyword()">Search Keyword</button>
</div>

<div id="results"></div>

<!-- Scanner -->
<div id="scannerContainer">
    <button id="closeBtn" onclick="closeScanner()">X</button>
    <video id="scannerVideo"></video>
    <div class="scan-line"></div>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="app.js"></script>

</body>
</html>
