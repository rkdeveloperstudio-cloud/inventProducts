<!DOCTYPE html>
<html>
<head>
    <title>Inventory PWA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: Arial;
            padding: 12px;
            background: #f5f5f5;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .box {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        #results div {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
        }

        /* SCANNER */
        #scannerContainer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            z-index: 9999;
        }

        #scannerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: blue;
            top: 50%;
            animation: move 1.2s infinite;
        }

        @keyframes move {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }

        #closeBtn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border: none;
            padding: 5px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<h3>Inventory Search</h3>

<div class="box">
    <h4>Barcode Search</h4>
    <input
    id="barcodeBox"
    placeholder="Enter barcode"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false">
    <button onclick="searchByBarcode()">Search Barcode</button>
    <button onclick="openScanner()">Open Camera Scan</button>
</div>

<div class="box">
    <h4>Keyword Search</h4>
    <input
    id="keywordBox"
    placeholder="Enter keyword"
    autocomplete="off"
    spellcheck="false">
    <button onclick="searchByKeyword()">Search</button>
</div>

<div id="results"></div>

<!-- Scanner -->
<div id="scannerContainer">
    <button id="closeBtn" onclick="closeScanner()">X</button>
    <video id="scannerVideo" playsinline autoplay muted></video>
    <div class="scan-line"></div>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("SW registered"))
        .catch(err => console.log("SW failed", err));
}
</script>
</body>
</html>
